<style>
  #news_feed {
    background: transparent;
    img {
      position: fixed;
      left: 0;
      top: 0;
      z-index: -1;
      object-fit: cover;
    }
  }
  .news_feed_label {
    position: fixed;
    width: 100%;
    background: #8d07aee0 !important;
    top: 68px;
    text-align: center;
    padding: 10px 0 10px 0px;
    border-bottom: 2px solid black;
  }
  .news_feed {
    margin-top: 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .news_feed > div:first-child {
    border: 1px solid #cc00ff;
  }
  .news_feed > div {
    border: 1px solid #717171;
    border-radius: 10px;
    background: #22222296;
    max-width: 500px;
    margin-bottom: 30px;
    padding: 20px;

    h5 {
      margin-bottom: 5px;
    }
    date {
      font-size: 15px;
      color: #808080;
      display: block;
      &::before {
        margin-bottom: 2px;
        margin-right: 5px;
      }
    }
    p:last-child {
      margin-bottom: unset;
    }
  }
</style>
<section id="news_feed">
  <img class="h-100 w-100" src="../assets/background.png" alt=" " />
  <h4 class="news_feed_label" style="background: black">PHPShift<span style="color: #ffffffad">™</span>/ News Feed</h4>
  <div class="container">
    <div class="news_feed">[[!news]]</div>
  </div>
</section>
