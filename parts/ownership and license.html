<style>
  #ownership_and_license {
    color: #d7d7d7;
    > div {
      max-height: 350px;
      overflow: hidden;
      padding-bottom: 20px;
      border-bottom: 1px solid #bbb;
    }
    > p {
      color: white;
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
      font-size: 20px;
      &::before {
        margin-right: 5px;
      }
      &:hover {
        color: #cc00ff;
      }
    }
    h4 {
      color: white;
      margin: 30px 0 20px 0;
    }
    a {
      color: white;
      &:hover {
        color: #cc00ff;
      }
    }
    .bi::before {
      font-size: 20px;
      margin-right: 10px;
    }
  }
  .openarticle {
    max-height: unset !important;
  }
</style>
<section id="ownership_and_license">
  <div class="container">
    <h2 class="text-white">Ownership & Licensing & Terms</h2>
    <br />
    ((meta: intro))
    ((meta: LICENSE))
    ((meta: TRADEMARKS))
    ((meta: TERMS_OF_USE))
    ((meta: CODE_OF_CONDUCT))
    ((meta: DISCLAIMER))
    ((meta: README))
    ((meta: CONTRIBUTING))
    ((meta: CHANGELOG))
    ((meta: SECURITY))
    ((meta: vision))
  </div>
  <p class="bi-chevron-down" onclick="toggleClass()">View Full Content</p>
  <script>
    function toggleClass() {
      var element = document.querySelector("#ownership_and_license > div");
      element.classList.toggle("openarticle");

      var icon = document.querySelector("#ownership_and_license > p");
      icon.classList.toggle("bi-chevron-down");
      icon.classList.toggle("bi-chevron-up");
    }
  </script>
</section>
